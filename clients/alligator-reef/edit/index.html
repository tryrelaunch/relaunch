<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Sign in to edit</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #080B10;
  --bg-2: #0D1117;
  --border: rgba(255,255,255,0.14);
  --white: #FFFFFF;
  --off-white: #E8EDF2;
  --muted: #5A6478;
  --muted-2: #8B96A8;
  --accent: #00E5FF;
  --green: #00FF88;
  --red: #FF5050;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg); color: var(--off-white);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.card {
  width: 100%; max-width: 380px;
  background: var(--bg-2); border: 1px solid var(--border);
  border-radius: 16px; padding: 36px 32px 28px;
}
.brand {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 28px; font-weight: 800; font-size: 16px; color: var(--white);
}
.brand-dot {
  width: 8px; height: 8px; background: var(--accent); border-radius: 50%;
  box-shadow: 0 0 12px var(--accent);
}
h1 { font-size: 22px; font-weight: 800; color: var(--white); margin-bottom: 6px; letter-spacing: -0.01em; }
.sub { font-size: 14px; color: var(--muted-2); margin-bottom: 28px; line-height: 1.55; }
label {
  display: block; font-size: 11px; font-weight: 700; color: var(--off-white);
  letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px;
}
input[type="tel"] {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 16px; color: var(--white);
  font: 600 18px -apple-system, sans-serif; letter-spacing: 0.4em; text-align: center;
  outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}
input[type="tel"]::placeholder { letter-spacing: 0.2em; color: var(--muted); font-weight: 400; }
input[type="tel"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,255,0.10); }
input[type="tel"].error { border-color: var(--red); }
button {
  width: 100%; margin-top: 16px;
  background: var(--white); color: var(--bg); border: none; border-radius: 10px;
  padding: 14px; font: 700 14px -apple-system, sans-serif;
  letter-spacing: 0.02em; cursor: pointer; transition: opacity 0.2s, transform 0.2s;
}
button:hover { opacity: 0.88; transform: translateY(-1px); }
button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.msg { min-height: 18px; margin-top: 14px; font-size: 13px; text-align: center; }
.msg.error { color: var(--red); }
.msg.success { color: var(--green); }
.foot { margin-top: 26px; font-size: 12px; color: var(--muted); text-align: center; line-height: 1.6; }
.foot a { color: var(--muted-2); text-decoration: underline; }
</style>
</head>
<body>
<form class="card" id="login-form" autocomplete="off">
  <div class="brand">
    <div class="brand-dot"></div>
    Relaunch
  </div>
  <h1>Sign in to edit</h1>
  <p class="sub">Enter your 6-digit edit PIN to make changes to your site.</p>

  <label for="pin">Your edit PIN</label>
  <input type="tel" id="pin" name="pin" inputmode="numeric" pattern="\d{6}" maxlength="6"
         autocomplete="one-time-code" placeholder="000000" required autofocus>

  <button type="submit" id="submit-btn">Sign in →</button>

  <div class="msg" id="msg"></div>

  <div class="foot">
    Forgot your PIN? <a href="mailto:support@tryrelaunch.com">Email support</a>
  </div>
</form>

<script>
(function() {
  // Slug is embedded by strip-demo.py at promotion time.
  const SLUG = "alligator-reef";
  const AUTH_ENDPOINT = "https://tryrelaunch.netlify.app/.netlify/functions/auth";

  const form = document.getElementById('login-form');
  const pinInput = document.getElementById('pin');
  const submitBtn = document.getElementById('submit-btn');
  const msgEl = document.getElementById('msg');

  // Numbers only
  pinInput.addEventListener('input', () => {
    pinInput.value = pinInput.value.replace(/\D/g, '').slice(0, 6);
    pinInput.classList.remove('error');
    msgEl.textContent = '';
    msgEl.className = 'msg';
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const pin = pinInput.value.trim();
    if (!/^\d{6}$/.test(pin)) {
      pinInput.classList.add('error');
      msgEl.textContent = 'Enter all 6 digits';
      msgEl.className = 'msg error';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing in...';
    msgEl.textContent = '';

    try {
      const res = await fetch(AUTH_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ slug: SLUG, pin })
      });

      if (res.status === 401) {
        pinInput.classList.add('error');
        pinInput.select();
        msgEl.textContent = 'Wrong PIN';
        msgEl.className = 'msg error';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign in →';
        return;
      }

      if (res.status === 429) {
        msgEl.textContent = 'Too many attempts — try again in 15 minutes';
        msgEl.className = 'msg error';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign in →';
        return;
      }

      if (res.status === 403) {
        msgEl.textContent = 'This site isn\'t configured for editing yet. Contact support.';
        msgEl.className = 'msg error';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign in →';
        return;
      }

      if (!res.ok) {
        throw new Error('Server error: ' + res.status);
      }

      const data = await res.json();
      if (!data.token) throw new Error('No token returned');

      try {
        localStorage.setItem('relaunch_jwt', data.token);
      } catch (e) {
        msgEl.textContent = 'Could not save session. Check your browser settings.';
        msgEl.className = 'msg error';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign in →';
        return;
      }

      msgEl.textContent = 'Signed in. Loading your site…';
      msgEl.className = 'msg success';
      setTimeout(() => { window.location.href = '/'; }, 600);

    } catch (err) {
      console.error(err);
      msgEl.textContent = 'Something went wrong. Try again, or email support.';
      msgEl.className = 'msg error';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Sign in →';
    }
  });
})();
</script>
</body>
</html>
