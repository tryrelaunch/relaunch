<!--
================================================================================
RELAUNCH EDIT WIDGET — preview-mode (temp edits, POST /.netlify/functions/edit)
Identical across every preview per RELAUNCH_OPERATIONS.md Section 5.
Three blocks: CSS + HTML + JS. Inline. No shared external file.

Auto-discovers all elements with id starting with "edit-" on the page and
sends their current content along with the user's instruction.
================================================================================
-->
<style>
.edit-fab {
  position: fixed;
  bottom: 22px;
  right: 22px;
  z-index: 100;
  background: #6f2a22;
  color: #fff;
  border: 0;
  border-radius: 999px;
  padding: 14px 22px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.04em;
  box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: transform .15s ease, box-shadow .15s ease;
}
.edit-fab:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(0,0,0,0.32); }
.edit-fab .edit-fab-dot {
  width: 9px;
  height: 9px;
  background: #d9a850;
  border-radius: 50%;
  display: inline-block;
  box-shadow: 0 0 0 0 rgba(217, 168, 80, 0.7);
  animation: editPulse 2s infinite;
}
@keyframes editPulse {
  0%   { box-shadow: 0 0 0 0 rgba(217, 168, 80, 0.7); }
  70%  { box-shadow: 0 0 0 12px rgba(217, 168, 80, 0); }
  100% { box-shadow: 0 0 0 0 rgba(217, 168, 80, 0); }
}
.edit-panel {
  position: fixed;
  bottom: 84px;
  right: 22px;
  z-index: 100;
  width: 360px;
  max-width: calc(100vw - 32px);
  max-height: 560px;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.30);
  display: none;
  flex-direction: column;
  font-family: 'Inter', sans-serif;
  overflow: hidden;
}
.edit-panel.open { display: flex; }
.edit-panel-head {
  background: #1c1612;
  color: #f5ead0;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.edit-panel-head h4 { margin: 0; font-size: 14px; font-weight: 600; color: #f5ead0; font-family: 'Inter', sans-serif; }
.edit-panel-head .sub { font-size: 11px; color: #d9a850; margin-top: 2px; letter-spacing: 0.04em; }
.edit-panel-close {
  background: transparent;
  color: #d4c39b;
  border: 0;
  font-size: 20px;
  line-height: 1;
  cursor: pointer;
  padding: 4px 6px;
}
.edit-msgs {
  flex: 1;
  overflow-y: auto;
  padding: 14px 16px;
  background: #faf3df;
  font-size: 13px;
  color: #1c1612;
}
.edit-msg { margin-bottom: 12px; }
.edit-msg.user {
  background: #6f2a22;
  color: #fff;
  padding: 10px 12px;
  border-radius: 10px 10px 2px 10px;
  margin-left: 40px;
}
.edit-msg.bot {
  background: #fff;
  border: 1px solid #d4c39b;
  padding: 10px 12px;
  border-radius: 10px 10px 10px 2px;
  margin-right: 40px;
  color: #1c1612;
}
.edit-msg.bot .edit-change-list {
  margin-top: 8px;
  padding: 8px 10px;
  background: #f5ead0;
  border-radius: 6px;
  font-size: 12px;
  color: #6f2a22;
}
.edit-form {
  border-top: 1px solid #d4c39b;
  padding: 12px 14px;
  background: #fff;
  display: flex;
  gap: 8px;
}
.edit-form textarea {
  flex: 1;
  border: 1px solid #d4c39b;
  border-radius: 6px;
  padding: 10px 12px;
  font-size: 13px;
  font-family: inherit;
  resize: none;
  min-height: 38px;
  max-height: 96px;
  color: #1c1612;
}
.edit-form textarea:focus { outline: 2px solid #c9933a; border-color: #c9933a; }
.edit-form button {
  background: #6f2a22;
  color: #fff;
  border: 0;
  border-radius: 6px;
  padding: 8px 14px;
  font-weight: 700;
  font-size: 12px;
  cursor: pointer;
}
.edit-form button:hover { background: #8a3a30; }
.edit-form button:disabled { opacity: 0.5; cursor: wait; }
@media (max-width: 480px) {
  .edit-panel { right: 16px; bottom: 78px; width: calc(100vw - 32px); }
  .edit-fab { right: 16px; bottom: 16px; }
}
</style>

<button class="edit-fab" id="edit-fab" onclick="toggleEditPanel()" aria-label="Edit this page">
  <span class="edit-fab-dot"></span>
  Edit this page
</button>

<div class="edit-panel" id="edit-panel" role="dialog" aria-label="Edit this page chat">
  <div class="edit-panel-head">
    <div>
      <h4>Edit by asking</h4>
      <div class="sub">Powered by Relaunch — preview mode</div>
    </div>
    <button class="edit-panel-close" onclick="toggleEditPanel()" aria-label="Close">×</button>
  </div>
  <div class="edit-msgs" id="edit-msgs">
    <div class="edit-msg bot">
      Welcome. Type any change in plain English — e.g. <em>&ldquo;raise the 18-hole rate to $42&rdquo;</em> or <em>&ldquo;change the tagline to: Sheridan's friendliest course.&rdquo;</em> I'll update the page live. Changes are temporary in preview mode.
    </div>
  </div>
  <form class="edit-form" id="edit-form" onsubmit="sendEdit(event)">
    <textarea id="edit-input" placeholder="What would you like to change?" rows="1" required></textarea>
    <button type="submit" id="edit-send">Send</button>
  </form>
</div>

<script>
function toggleEditPanel() {
  document.getElementById('edit-panel').classList.toggle('open');
}
function addMessage(text, who, changes) {
  var box = document.getElementById('edit-msgs');
  var d = document.createElement('div');
  d.className = 'edit-msg ' + who;
  d.textContent = text;
  if (changes && changes.length) {
    var c = document.createElement('div');
    c.className = 'edit-change-list';
    c.textContent = 'Updated: ' + changes.map(function(x){ return x.id.replace(/^edit-/, ''); }).join(', ');
    d.appendChild(c);
  }
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
}
function collectEditableContent() {
  var out = {};
  document.querySelectorAll('[id^="edit-"]').forEach(function(el){
    out[el.id] = el.textContent.trim();
  });
  return out;
}
function applyChanges(changes) {
  (changes || []).forEach(function(c){
    var el = document.getElementById(c.id);
    if (el && typeof c.text === 'string') el.textContent = c.text;
  });
}
function sendEdit(e) {
  e.preventDefault();
  var input = document.getElementById('edit-input');
  var btn   = document.getElementById('edit-send');
  var text  = input.value.trim();
  if (!text) return;
  addMessage(text, 'user');
  input.value = '';
  btn.disabled = true;
  btn.textContent = '…';
  fetch('/.netlify/functions/edit', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ request: text, content: collectEditableContent() })
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    applyChanges(data.changes || []);
    addMessage(data.confirmation || 'Done.', 'bot', data.changes);
  })
  .catch(function(){
    addMessage("I couldn't reach the edit service — this is a preview, so the backend may not be wired up yet. Once you've signed up, the chat is live.", 'bot');
  })
  .finally(function(){
    btn.disabled = false;
    btn.textContent = 'Send';
    input.focus();
  });
}
// auto-grow textarea
document.getElementById('edit-input').addEventListener('input', function(){
  this.style.height = 'auto';
  this.style.height = Math.min(96, this.scrollHeight) + 'px';
});
</script>
